<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Web Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style type="text/css">
        div {
            display: block;
        }

        a {
            margin: 0.4rem;
            text-decoration: none;
        }

        *,
        ::after,
        ::before {
            -webkit-box-sizing: inherit;
            box-sizing: inherit;
        }

        p {
            margin: 0 0 1rem;
        }

        body {
            overscroll-behavior: none;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI",
                Roboto, "Helvetica Neue", sans-serif;
        }

        .text-center {
            text-align: center;
        }

        .gray {
            color: #667189;
        }

        .shadow {
            filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.07)) drop-shadow(0 2px 2px rgb(0 0 0 / 0.06));
        }

        .w-full {
            width: 100%;
        }

        .grid {
            display: grid;
        }

        .gap-2 {
            gap: 0.5rem;
        }

        .flex {
            display: flex;
        }

        .grow {
            flex-grow: 1;
        }

        .justify-items-end {
            justify-items: end;
        }

        .rounded {
            border-radius: 0.5rem;
        }

        .section {
            box-sizing: border-box;
            background-color: #f8f9fa;
        }

        .main {
            /* padding-top: 3rem; */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            height: 100dvh;
        }

        .main .pannel {
            position: relative;
            border: #fff;
            border-style: solid;
            border-width: 0.5rem;
            border-radius: 1rem;
            background-color: #fff;
            width: calc(100% - 1rem);
            font-size: medium;
            margin-top: 2.5rem;
        }

        .pannel button {
            cursor: pointer;
            padding: 8px 10px 8px;
            font-size: medium;
            outline-style: none;
            border: 0px;
            color: #fff;
            background-color: #0067f4;
        }

        .pannel button:disabled {
            background-color: #5a6169;
        }

        .pannel #record {
            min-height: 3.25rem;
            padding: 0.5rem;
            resize: vertical;
            overscroll-behavior: none;
        }

        #control-button {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
        }

        #control-button button {
            background-color: #5a6169;
        }

        #flow-lock-btn .lock-open { display: none; }
        #flow-lock-btn.unlocked .lock-open { display: inline; }
        #flow-lock-btn.unlocked .lock-closed { display: none; }

        .alert span {
            user-select: none;
            background: #ffe14d;
            padding: 2px 10px;
            display: block;
            color: black;
        }

        .footer {
            padding: 1rem 0.5rem;
            background-color: white;
        }

        .copyright {
            padding-bottom: 1rem;
        }

        .float-left {
            float: left;
        }

        .float-right {
            float: right;
        }
    </style>
</head>

<body>
    <div class="section main text-center">
        <h1 id="title" style="display: none;">Web Console</h1>
        <a href="/">
            <img id="logo" src="/logo" onerror="removeLogo();" />
        </a>

        <div class="pannel shadow grid gap-2">
            <div id="control-button">
                <button class="rounded shadow" onclick="terminalClean()">&#x1F5D1;&#xFE0E;</button>
                <button id="flow-lock-btn" class="rounded shadow unlocked" onclick="enableFlowLock=!enableFlowLock;this.classList.toggle('unlocked')"><span class="lock-closed">&#x1F512;&#xFE0E;</span><span class="lock-open">&#x1F513;&#xFE0E;</span></button>
                <button class="rounded shadow" onclick="enableTimestamp=!enableTimestamp">&#x1F550;&#xFE0E;</button>
                <button class="rounded shadow" onclick="enableStripAnsiEscapeCodes=!enableStripAnsiEscapeCodes">&#x1F9F9;&#xFE0E;</button>
            </div>
            <textarea class="w-full rounded" title="record" id="record" cols="30" rows="40" disabled></textarea>
            <div class="flex w-full grid gap-2" id="terminal">
                <input type="text" name="cmd" id="command-text" class="grow rounded" /><button
                    class="grid justify-items-end rounded shadow" id="command-button">
                    SEND
                </button>
            </div>
        </div>
        <h1 />
    </div>
</body>
<script>
    let gateway = ((window.location.protocol === "https:") ? "wss://" : "ws://") + window.location.host + (window.location.pathname.endsWith("/") ? window.location.pathname.slice(0, -1) : window.location.pathname) + 'ws';
    let websocket;
    let textArea = document.getElementById("record");
    let enableFlowLock = false;
    let enableTimestamp = false;
    let enableStripAnsiEscapeCodes = true;
    let pingTimeout;
    let connectTimeout;
    let commandHistory = [];
    let commandHistoryIdx = 0;

    function removeLogo() {
        document.getElementById("logo").remove();
        document.getElementById("title").style.display = "block";
    }

    // https://raw.githubusercontent.com/chalk/ansi-regex/refs/heads/main/index.js
    function ansiRegex({onlyFirst = false} = {}) {
        // Valid string terminator sequences are BEL, ESC\, and 0x9c
        const ST = '(?:\\u0007|\\u001B\\u005C|\\u009C)';

        // OSC sequences only: ESC ] ... ST (non-greedy until the first ST)
        const osc = `(?:\\u001B\\][\\s\\S]*?${ST})`;

        // CSI and related: ESC/C1, optional intermediates, optional params (supports ; and :) then final byte
        const csi = '[\\u001B\\u009B][[\\]()#;?]*(?:\\d{1,4}(?:[;:]\\d{0,4})*)?[\\dA-PR-TZcf-nq-uy=><~]';

        const pattern = `${osc}|${csi}`;

        return new RegExp(pattern, onlyFirst ? undefined : 'g');
    }

    function initWebPage() {
        document.getElementById("command-button").disabled = true;
        document.getElementById("command-text").disabled = true;
        initCommandHistory();
        initWebSocket();
        initButton();
        trapKeyPress();
    }

    function initCommandHistory() {
        const json = localStorage.history;
        commandHistory = json ? JSON.parse(json) : [];
        commandHistoryIdx = commandHistory.length;
    }

    function initWebSocket() {
        clearTimeout(connectTimeout);
        clearTimeout(pingTimeout);
        pingTimeout = false;
        connectTimeout = setTimeout(() => {
            terminalWrite("[WebSerial] Connect timeout.");
            websocket.close();
            initWebSocket();
        }, 3000);
        terminalWrite("[WebSerial] Connecting ...");
        websocket = new WebSocket(gateway);
        websocket.onopen = onOpen;
        websocket.onclose = onClose;
        websocket.onmessage = onMessage;
        websocket.onerror = onError;
    }

    function initButton() {
        document.getElementById("command-button").addEventListener("click", sendCommand);
    }

    function trapKeyPress() {
        document.getElementById("command-text").addEventListener("keypress", (event) => {
            if (event.code === "Enter") {
                event.preventDefault();
                document.getElementById("command-button").click();
            }
        });
        document.addEventListener("keydown", (event) => {
            if (document.activeElement && document.activeElement.id === 'command-text') {
                if (event.code === "ArrowUp") {
                    commandHistoryIdx--;
                    if (commandHistoryIdx < 0)
                        commandHistoryIdx = commandHistory.length > 0 ? commandHistory.length - 1 : 0;
                    if (commandHistoryIdx >= 0 && commandHistoryIdx < commandHistory.length)
                        document.getElementById("command-text").value = commandHistory[commandHistoryIdx];

                } else if (event.code === "ArrowDown") {
                    commandHistoryIdx++;
                    if (commandHistoryIdx >= commandHistory.length)
                        commandHistoryIdx = 0;
                    if (commandHistoryIdx >= 0 && commandHistoryIdx < commandHistory.length)
                        document.getElementById("command-text").value = commandHistory[commandHistoryIdx];
                }
            }
        });
    }

    function onOpen(event) {
        clearTimeout(connectTimeout);
        terminalWrite("[WebSerial] Connected successfully.");
        document.getElementById("command-button").disabled = false;
        document.getElementById("command-text").disabled = false;
    }

    function onError(e) {
        console.log("[WebSerial] Error!", e);
        websocket.close();
    }

    function onClose(e) {
        console.log("[WebSerial] Connection closed.", e);
    }

    function onMessage(event) {
        if (event.data == 'pong') {
            clearTimeout(pingTimeout);
            pingTimeout = false;
        } else {
            terminalWrite(event.data);
        }
    }

    function terminalWrite(raw) {
        if (enableTimestamp) {
            let now = new Date();
            raw = "[" + now.toLocaleTimeString() + "] " + raw;
        }
        if (enableStripAnsiEscapeCodes && typeof raw == 'string') {
            raw = raw.replace(ansiRegex(), '');
        }
        textArea.value += raw + "\n";
        if (!enableFlowLock) {
            textArea.scrollTop = textArea.scrollHeight;
        }
    }

    function terminalClean() {
        textArea.value = "";
        textArea.scrollTop = textArea.scrollHeight;
    }

    function sendCommand() {
        let cmd = document.getElementById("command-text").value;
        console.log('send command: ', cmd);
        websocket.send(cmd);
        commandHistory.push(cmd);
        console.log('history size: ', commandHistory.length);
        if (commandHistory.length > 20) {
            console.log('history cleanup');
            commandHistory.splice(0, commandHistory.length - 20);
            console.log('history size: ', commandHistory.length);
        }
        commandHistoryIdx = commandHistory.length;
        document.getElementById("command-text").value = "";
        localStorage.history = JSON.stringify(commandHistory);
    }

    setInterval(() => {
        if (!pingTimeout && websocket.readyState == WebSocket.OPEN) {
            pingTimeout = setTimeout(() => {
                terminalWrite("[WebSerial] Ping timeout.");
                websocket.close();
                initWebSocket();
            }, 3000);
            websocket.send("ping");
        }
    }, 2000);

    window.addEventListener("DOMContentLoaded", function () {
        initWebPage();
    }, false);
</script>

</html>
